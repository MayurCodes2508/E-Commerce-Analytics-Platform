name: CD Pipeline
on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:
  dbt-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-bigquery

      - name: Authenticate GCP
        run: |
          echo '${{ secrets.E_COMMERCE_ANALYTICS_PLATFORM_GCP_KEY }}' > dbt_project/gcp_key.json
          
      - name: Create dbt profile
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          ecommerce_analytics_platform:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: service-account
                project: intense-pixel-490219-h2
                dataset: prod
                threads: 4
                keyfile: gcp_key.json
          EOF

      - name: Run dbt (PROD)
        working-directory: ./dbt_project

        env:
          GOOGLE_APPLICATION_CREDENTIALS: gcp_key.json
        run: |
          dbt deps
          dbt build --target prod