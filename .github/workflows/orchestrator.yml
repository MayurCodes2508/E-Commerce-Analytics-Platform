name: Data Pipeline Orchestrator
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
concurrency:
  group: 'data-pipeline'
  cancel-in-progress: false
jobs:
  orchestrate:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Authenticate GCP (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Generate customers
        working-directory: ./data_generator/scripts
        run: python generate_customers.py

      - name: Generate orders
        working-directory: ./data_generator/scripts
        run: python generate_orders.py

      - name: Generate order items
        working-directory: ./data_generator/scripts  
        run: python generate_order_items.py

      - name: Generate payments
        working-directory: ./data_generator/scripts
        run: python generate_payments.py

      - name: Generate shipments
        working-directory: ./data_generator/scripts
        run: python generate_shipments.py
        
      - name: Run Ingestor
        working-directory: ./ingestion
        run: |
          python load_to_bigquery.py || exit 1

      - name: Create dbt profile
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          ecommerce_analytics_platform:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: oauth
                project: intense-pixel-490219-h2
                dataset: prod
                threads: 4
          EOF

      - name: Run dbt
        working-directory: ./dbt_project
        run: |
          dbt deps
          dbt build --target prod --fail-fast --log-level info