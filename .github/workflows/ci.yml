name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  dbt-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Authenticate GCP (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/884914971497/locations/global/workloadIdentityPools/github-pool-v2/providers/github-provider
          service_account: ecommerce-analytics-platform@intense-pixel-490219-h2.iam.gserviceaccount.com
          token_format: access_token
          create_credentials_file: true
          export_environment_variables: true

      - name: Create dbt profile
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          ecommerce_analytics_platform:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: service-account
                project: intense-pixel-490219-h2
                dataset: ci_dev
                threads: 4
          EOF

      - name: Run dbt
        working-directory: ./dbt_project
        run: |
          dbt deps
          dbt build --target ci