name: ecommerce_analytics_platform
version: '1.0'
config-version: 2

profile: ecommerce_analytics_platform

model-paths: ["models"]
snapshot-paths: ["snapshots"]
macro-paths: ["macros"]
test-paths: ["tests"]

models:
  ecommerce_analytics_platform:
    +on_configuration_change: apply
    +on_schema_change: append_new_columns

    staging:
      +schema: staging
      +materialized: view

    core:
      +schema: core

      intermediates:
        +materialized: view

      dimensions:
        +materialized: table
      
      facts:
        +materialized: incremental
        +incremental_strategy: merge
      
    marts:
      +schema: marts
      +materialized: table