version: 2
models:
  - name: fct_orders
    config:
      contract:
        enforced: true
    description: "Orders fact table containing order header information with foreign keys to dimensions for analytics and reporting."
    
    columns:
      - name: order_key
        data_type: string
        description: "Surrogate key for the orders fact"
        tests:
          - not_null
          - unique

      - name: order_id
        data_type: integer
        description: "Natural key from the source system"
        tests:
          - not_null

      - name: customer_key
        data_type: string
        description: "Foreign key to the customers dimension"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_key

      - name: order_created_at_date_key
        data_type: integer
        description: "Foreign key to the date dimension"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: created_at
        data_type: timestamp
        description: "Timestamp when the order was created"

      - name: order_status
        data_type: string
        description: "Status of the order"
