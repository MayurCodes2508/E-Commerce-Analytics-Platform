version: 2
models:
  - name: stg_order_items
    description: "Staging model for order items data that standardizes the price field by casting it to NUMERIC type and includes an ingestion timestamp for data lineage."
    columns:
      - name: order_item_id
        description: "Unique identifier for each order item"
        tests:
          - not_null
          - unique

      - name: order_id
        description: "Identifier of the order this item belongs to"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id

      - name: product_id
        description: "Identifier of the product in this order item"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id

      - name: quantity
        description: "Number of units of the product ordered"

      - name: price
        description: "Price per unit of the product"

      - name: ingestion_timestamp
        description: "Timestamp when the data was ingested into the data warehouse"
        tests:
          - not_null
