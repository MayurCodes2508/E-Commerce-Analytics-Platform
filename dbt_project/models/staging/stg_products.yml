version: 2
models:
  - name: stg_products
    description: "Staging model for products data that trims whitespace from text fields, casts base_price to NUMERIC and created_at to DATE type, and includes an ingestion timestamp for data lineage."
    columns:
      - name: product_id
        description: "Unique identifier for each product"
        tests:
          - not_null
          - unique

      - name: product_name
        description: "Name of the product"

      - name: category
        description: "Category of the product"

      - name: brand
        description: "Brand of the product"

      - name: base_price
        description: "Base price of the product"

      - name: created_at
        description: "Date when the product was created"

      - name: is_active
        description: "Boolean flag indicating if the product is active"
        tests:
          - not_null

      - name: ingestion_timestamp
        description: "Timestamp when the data was ingested into the data warehouse"
        tests:
          - not_null