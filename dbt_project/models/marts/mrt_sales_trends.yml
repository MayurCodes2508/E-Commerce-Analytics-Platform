version: 2

models:
  - name: mrt_sales_trends
    description: >
      This mart provides time-series sales metrics at a daily grain.
      It includes multiple revenue definitions and order metrics:
      - Gross Revenue: total sales before exclusions
      - Net Revenue: excludes refunded orders
      - Realized Revenue: includes only completed (shipped/delivered) orders
      - AOV metrics calculated based on respective order definitions

    columns:
      - name: date
        description: "Date representing the aggregation grain for sales metrics."
        tests:
          - not_null
          - unique

      - name: gross_revenue_by_date
        description: "Total revenue including all orders."
        tests:
          - not_null

      - name: net_revenue_by_date
        description: "Revenue excluding refunded orders."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "<= gross_revenue_by_date"

      - name: realized_revenue_by_date
        description: "Revenue from completed (shipped or delivered) orders."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "<= net_revenue_by_date"

      - name: total_orders_by_date
        description: "Total number of orders placed."
        tests:
          - not_null

      - name: valid_orders_by_date
        description: "Total number of non-refunded orders."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "<= total_orders_by_date"

      - name: completed_orders_by_date
        description: "Total number of completed (shipped/delivered) orders."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "<= valid_orders_by_date"

      - name: gross_aov_by_date
        description: "Average order value based on total orders."
        tests:
          - not_null

      - name: net_aov_by_date
        description: "Average order value based on valid (non-refunded) orders."
        tests:
          - not_null

      - name: realized_aov_by_date
        description: "Average order value based on completed orders."
        tests:
          - not_null

      - name: dbt_loaded_at
        description: "Timestamp when this mart was last built."
        tests:
          - not_null